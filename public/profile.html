<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Pro — Profile</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        :root { --blue: #0084ff; --green: #00b84c; --red: #ff3b3b; --yellow: #ffcc00; }

        body { min-height: 100vh; background: linear-gradient(135deg, #0a0a1a, #12122a, #1a1a35); color: #fff; }

        nav {
            background: rgba(0,0,0,0.4); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0 24px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { font-size: 22px; font-weight: 900; color: var(--yellow); }
        .nav-links { display: flex; gap: 6px; }
        .nav-link { padding: 8px 16px; border-radius: 10px; text-decoration: none; color: #aaa; font-weight: 600; font-size: 14px; transition: all 0.2s; cursor: pointer; border: none; background: transparent; }
        .nav-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-link.active { background: rgba(0,132,255,0.2); color: var(--blue); }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .user-pill { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 700; }
        .btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 7px 14px; color: #aaa; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .btn-logout:hover { background: rgba(255,59,59,0.15); border-color: var(--red); color: var(--red); }

        main { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

        /* PROFILE HEADER */
        .profile-header {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 32px; margin-bottom: 24px;
            display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
        }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #0084ff, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 900; flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(0,132,255,0.3);
        }
        .profile-info h2 { font-size: 26px; font-weight: 900; }
        .profile-info p { color: #888; margin-top: 4px; font-size: 14px; }
        .member-since { margin-top: 8px; background: rgba(255,255,255,0.06); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #aaa; display: inline-block; }

        /* STAT CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        @media (max-width: 650px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-icon { font-size: 24px; margin-bottom: 6px; }
        .stat-value { font-size: 30px; font-weight: 900; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-top: 4px; }
        .stat-card.wins .stat-value { color: var(--yellow); }
        .stat-card.games .stat-value { color: var(--blue); }
        .stat-card.kills .stat-value { color: var(--red); }
        .stat-card.rate .stat-value { color: var(--green); }

        /* PANELS */
        .grid-2 { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 24px; }
        @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }
        .panel { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 24px; }
        .panel-title { font-size: 16px; font-weight: 800; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .panel-title span { font-size: 18px; }

        /* RANK BREAKDOWN */
        .rank-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-row:last-child { border-bottom: none; }
        .rank-badge { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; flex-shrink: 0; }
        .r1 { background: rgba(255,215,0,0.15); color: gold; border: 2px solid gold; }
        .r2 { background: rgba(192,192,192,0.15); color: #c0c0c0; border: 2px solid #c0c0c0; }
        .r3 { background: rgba(205,127,50,0.15); color: #cd7f32; border: 2px solid #cd7f32; }
        .r4 { background: rgba(100,100,100,0.15); color: #888; border: 2px solid #444; }
        .rank-label { flex: 1; font-weight: 700; font-size: 14px; }
        .rank-count { font-weight: 900; font-size: 20px; }
        .rank-bar-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; margin-top: 4px; }
        .rank-bar { height: 100%; border-radius: 3px; transition: width 1s ease; }

        /* GAME HISTORY TABLE */
        .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .history-table th { color: #666; padding: 8px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .history-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
        .history-table tr:last-child td { border-bottom: none; }
        .color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .kill-count { color: var(--red); font-weight: 700; }

        .empty-state { text-align: center; padding: 40px 20px; color: #666; }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

        .loading { text-align: center; padding: 60px; color: #555; }

        .play-btn { display: block; background: linear-gradient(135deg, #0084ff, #5b21b6); color: #fff; padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; text-align: center; text-decoration: none; margin-top: 20px; transition: all 0.2s; }
        .play-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(0,132,255,0.4); }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">🎲 Ludo Pro</div>
        <div class="nav-links">
            <a class="nav-link" href="/dashboard">Dashboard</a>
            <a class="nav-link active" href="/profile">Profile</a>
        </div>
        <div class="nav-right">
            <div class="user-pill" id="navUser">...</div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main>
        <div id="loading" class="loading">Loading profile...</div>
        <div id="content" style="display:none;">
            <!-- HEADER -->
            <div class="profile-header">
                <div class="avatar" id="avatarLetter">?</div>
                <div class="profile-info">
                    <h2 id="profileName"></h2>
                    <p>Ludo Pro Player</p>
                    <div class="member-since" id="memberSince"></div>
                </div>
                <a href="/dashboard" class="play-btn" style="margin-top:0; margin-left:auto;">🎮 Play Now</a>
            </div>

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card wins"><div class="stat-icon">🏆</div><div class="stat-value" id="statWins">0</div><div class="stat-label">Wins</div></div>
                <div class="stat-card games"><div class="stat-icon">🎮</div><div class="stat-value" id="statGames">0</div><div class="stat-label">Games</div></div>
                <div class="stat-card kills"><div class="stat-icon">💀</div><div class="stat-value" id="statKills">0</div><div class="stat-label">Kills</div></div>
                <div class="stat-card rate"><div class="stat-icon">📈</div><div class="stat-value" id="statRate">0%</div><div class="stat-label">Win Rate</div></div>
            </div>

            <!-- RANK BREAKDOWN + HISTORY -->
            <div class="grid-2">
                <div class="panel">
                    <div class="panel-title"><span>🎯</span> Placement History</div>
                    <div id="rankBreakdown">
                        <div class="empty-state"><div class="icon">🎮</div><p>Play some games to see stats!</p></div>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-title"><span>📋</span> Recent Games</div>
                    <div id="gameHistory">
                        <div class="empty-state"><div class="icon">🎮</div><p>No games yet. Start playing!</p></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function init() {
            const me = await fetch('/api/auth/me').then(r => r.json());
            if (!me.success) { window.location.href = '/'; return; }
            document.getElementById('navUser').innerText = '👤 ' + me.user.username;

            const data = await fetch('/api/profile').then(r => r.json());
            if (!data.success) return;

            const u = data.user;
            const firstLetter = u.username.charAt(0).toUpperCase();
            document.getElementById('avatarLetter').innerText = firstLetter;
            document.getElementById('profileName').innerText = u.username;
            document.getElementById('memberSince').innerText = '📅 Member since ' + new Date(u.created_at).toLocaleDateString('en-IN', { month:'long', year:'numeric' });

            document.getElementById('statWins').innerText = u.wins;
            document.getElementById('statGames').innerText = u.games_played;
            document.getElementById('statKills').innerText = u.kills;
            const rate = u.games_played > 0 ? Math.round((u.wins / u.games_played) * 100) : 0;
            document.getElementById('statRate').innerText = rate + '%';

            renderRankBreakdown(data.rankCounts, u.games_played);
            renderHistory(data.history);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function renderRankBreakdown(rankCounts, totalGames) {
            if (!rankCounts || rankCounts.length === 0) return;
            const map = {};
            rankCounts.forEach(r => map[r.rank] = parseInt(r.count));
            const max = Math.max(...Object.values(map), 1);
            const labels = { 1: '1st Place 🥇', 2: '2nd Place 🥈', 3: '3rd Place 🥉', 4: 'Last Place' };
            const colors = { 1: 'gold', 2: '#c0c0c0', 3: '#cd7f32', 4: '#555' };
            let html = '';
            for (let r = 1; r <= 4; r++) {
                const count = map[r] || 0;
                const pct = Math.round((count / max) * 100);
                html += `<div class="rank-row">
                    <div class="rank-badge r${r}">${r}</div>
                    <div style="flex:1;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                            <span class="rank-label">${labels[r]}</span>
                            <span class="rank-count" style="color:${colors[r]}">${count}</span>
                        </div>
                        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%; background:${colors[r]}"></div></div>
                    </div>
                </div>`;
            }
            document.getElementById('rankBreakdown').innerHTML = html;
        }

        function renderHistory(history) {
            if (!history || history.length === 0) return;
            const colorHex = { blue:'#0084ff', red:'#ff3b3b', green:'#00b84c', yellow:'#ffcc00' };
            const medals = { 1:'🥇', 2:'🥈', 3:'🥉', 4:'💔' };
            let html = `<table class="history-table">
                <thead><tr><th>Result</th><th>Color</th><th>Players</th><th style="color:#ff6b6b">Kills</th><th>Date</th></tr></thead><tbody>
                ${history.map(g => `<tr>
                    <td><span style="font-size:15px;">${medals[g.rank]||g.rank}</span> <span style="font-size:12px; color:#aaa;">#${g.rank}</span></td>
                    <td><span class="color-dot" style="background:${colorHex[g.color]||'#fff'}"></span>${g.color.toUpperCase()}</td>
                    <td style="color:#888">${g.total_players}P</td>
                    <td class="kill-count">💀 ${g.kills}</td>
                    <td style="color:#666; font-size:12px;">${new Date(g.played_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'})}</td>
                </tr>`).join('')}
                </tbody></table>`;
            document.getElementById('gameHistory').innerHTML = html;
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/';
        }

        init();
    </script>
</body>
</html>
