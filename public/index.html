<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Pro — Sign In</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        :root { --blue: #0084ff; --green: #00b84c; --red: #ff3b3b; --yellow: #ffcc00; --purple: #7c3aed; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; padding: 20px;
        }

        .brand { text-align: center; margin-bottom: 32px; }
        .brand h1 { font-size: 48px; font-weight: 900; letter-spacing: -1px; }
        .brand h1 span { color: var(--yellow); }
        .brand p { color: #aaa; margin-top: 8px; font-size: 15px; }
        .dice-icons { font-size: 28px; margin-bottom: 8px; }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 36px;
            width: 100%; max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .tabs { display: flex; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 9px; cursor: pointer; font-weight: 700; font-size: 15px; color: #aaa; transition: all 0.2s; border: none; background: transparent; }
        .tab.active { background: var(--blue); color: #fff; box-shadow: 0 4px 12px rgba(0,132,255,0.4); }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        input {
            width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.15); border-radius: 12px;
            color: #fff; font-size: 16px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--blue); background: rgba(0,132,255,0.08); }
        input::placeholder { color: #666; }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-primary { background: linear-gradient(135deg, #0084ff, #0060cc); color: #fff; box-shadow: 0 6px 20px rgba(0,132,255,0.35); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(0,132,255,0.5); }
        .btn-primary:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .error-msg { background: rgba(255,59,59,0.15); border: 1px solid rgba(255,59,59,0.3); border-radius: 10px; padding: 12px 15px; color: #ff6b6b; font-size: 14px; margin-bottom: 16px; display: none; }
        .success-msg { background: rgba(0,184,76,0.15); border: 1px solid rgba(0,184,76,0.3); border-radius: 10px; padding: 12px 15px; color: #00d45a; font-size: 14px; margin-bottom: 16px; display: none; }

        .hint { font-size: 12px; color: #666; margin-top: 6px; }
        .divider { text-align: center; color: #555; margin: 20px 0; font-size: 13px; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #333; }
        .divider::before { left: 0; } .divider::after { right: 0; }

        .features { display: flex; gap: 12px; margin-top: 24px; }
        .feat { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; text-align: center; }
        .feat .icon { font-size: 22px; margin-bottom: 4px; }
        .feat p { font-size: 11px; color: #888; }
        .feat strong { font-size: 13px; color: #ccc; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="brand">
        <div class="dice-icons">🎲🎮🏆</div>
        <h1>Ludo <span>Pro</span></h1>
        <p>Multiplayer Ludo with Live Leaderboards & Stats</p>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
            <button class="tab" id="tabSignUp" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <!-- SIGN IN FORM -->
        <div id="signinForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="siUsername" placeholder="Your username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="siPassword" placeholder="Your password" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" id="signinBtn" onclick="doSignIn()">Sign In →</button>
        </div>

        <!-- SIGN UP FORM -->
        <div id="signupForm" style="display:none;">
            <div class="form-group">
                <label>Choose Username</label>
                <input type="text" id="suUsername" placeholder="e.g. LudoKing123" maxlength="20" autocomplete="username">
                <p class="hint">3–20 chars, letters/numbers/underscore only</p>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="suPassword" placeholder="Min 6 characters" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="suConfirm" placeholder="Repeat password" autocomplete="new-password">
            </div>
            <button class="btn btn-primary" id="signupBtn" onclick="doSignUp()">Create Account →</button>
        </div>

        <div class="features">
            <div class="feat"><div class="icon">🏆</div><strong>Leaderboard</strong><p>Global rankings</p></div>
            <div class="feat"><div class="icon">📊</div><strong>Stats</strong><p>Track progress</p></div>
            <div class="feat"><div class="icon">💀</div><strong>Kills</strong><p>Score history</p></div>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        fetch('/api/auth/me').then(r => r.json()).then(d => {
            if (d.success) window.location.href = '/dashboard';
        }).catch(() => {});

        function switchTab(tab) {
            document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
            document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
            document.getElementById('tabSignUp').classList.toggle('active', tab === 'signup');
            hideMessages();
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.innerText = msg; el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.innerText = msg; el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
        function hideMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        async function doSignIn() {
            const username = document.getElementById('siUsername').value.trim();
            const password = document.getElementById('siPassword').value;
            if (!username || !password) return showError('Please fill in all fields');

            const btn = document.getElementById('signinBtn');
            btn.disabled = true; btn.innerText = 'Signing in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    showSuccess('Welcome back! Redirecting...');
                    setTimeout(() => window.location.href = '/dashboard', 800);
                } else {
                    showError(data.error || 'Sign in failed');
                    btn.disabled = false; btn.innerText = 'Sign In →';
                }
            } catch (e) {
                showError('Connection error. Please try again.');
                btn.disabled = false; btn.innerText = 'Sign In →';
            }
        }

        async function doSignUp() {
            const username = document.getElementById('suUsername').value.trim();
            const password = document.getElementById('suPassword').value;
            const confirm = document.getElementById('suConfirm').value;
            if (!username || !password || !confirm) return showError('Please fill in all fields');
            if (password !== confirm) return showError('Passwords do not match');
            if (password.length < 6) return showError('Password must be at least 6 characters');

            const btn = document.getElementById('signupBtn');
            btn.disabled = true; btn.innerText = 'Creating account...';

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    showSuccess('Account created! Redirecting to dashboard...');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showError(data.error || 'Sign up failed');
                    btn.disabled = false; btn.innerText = 'Create Account →';
                }
            } catch (e) {
                showError('Connection error. Please try again.');
                btn.disabled = false; btn.innerText = 'Create Account →';
            }
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                if (document.getElementById('signinForm').style.display !== 'none') doSignIn();
                else doSignUp();
            }
        });
    </script>
</body>
</html>
